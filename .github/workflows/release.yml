name: Release

# Mirrors the TRD Workbench release flow. Triggered BY HAND with a version
# string: build + sign (Developer ID + hardened runtime) + notarize + staple on
# a macOS runner, then attach the DMG to a DRAFT GitHub Release. `gh` creates the
# v<version> tag from the input — there is NO tag trigger and no manual tagging.
# Download the draft, test on a clean Mac, then click Publish to go public.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12_BASE64   base64 of the Developer ID Application .p12 (cert + key)
#   MACOS_CERT_PASSWORD     the .p12 export password
#   AC_API_KEY_P8           App Store Connect API key — the .p8 file contents
#   AC_API_KEY_ID           the key's Key ID
#   AC_API_ISSUER_ID        the key's Issuer ID (UUID)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.1"
        required: true
        type: string

permissions:
  contents: write   # create the draft release (and, on publish, its tag)

jobs:
  release:
    runs-on: macos-14
    env:
      CODESIGN_IDENTITY: "Developer ID Application: Filippo Diotalevi (2FV8WB29XC)"
      NOTARY_PROFILE: trd-notary
      TRDSPEAK_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Stamp the release version into the app
        run: |
          set -euo pipefail
          sed -i '' "s/^__version__ = .*/__version__ = \"${TRDSPEAK_VERSION}\"/" flow/__init__.py
          grep '__version__' flow/__init__.py

      - name: Import Developer ID certificate into a temporary keychain
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KCPASS="$(openssl rand -base64 24)"
          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          printf '%s' "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Store notarytool credentials (App Store Connect API key)
        env:
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/AuthKey.p8"
          printf '%s\n' "$AC_API_KEY_P8" > "$KEY"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$KEY" \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --keychain "$RUNNER_TEMP/build.keychain-db"
          rm -f "$KEY"

      - name: Build, sign, notarize, staple and package the DMG
        run: ./make_release.sh

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${TRDSPEAK_VERSION}" \
            --draft \
            --title "TRD Speak v${TRDSPEAK_VERSION}" \
            --generate-notes \
            dist/TRDSpeak.dmg
